<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Παναγιώτα & Γιάννης</title>
    <style>		
		@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@400;500&display=swap');

		* {
		  margin: 0;
		  padding: 0;
		  box-sizing: border-box;
		}

		body {
		  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
		  background: #d9efed;
		  color: #1a1715;
		  min-height: 100vh;
		  display: grid;
		  place-items: center;
		  padding: 32px 24px;
		  -webkit-font-smoothing: antialiased;
		}

		.page {
		  width: 100%;
		  max-width: 720px;
		  text-align: center;
		}

		.card {
		  padding: 24px 0 56px;
		}

		.eyebrow {
		  font-size: 12px;
		  font-weight: 500;
		  text-transform: uppercase;
		  letter-spacing: 0.25em;
		  color: #6b5d50;
		  margin-bottom: 32px;
		}

		.names {
		  font-family: 'Cormorant Garamond', serif;
		  font-weight: 300;
		  font-style: italic;
		  font-size: clamp(48px, 8vw, 96px);
		  line-height: 1;
		  letter-spacing: -0.02em;
		  margin-bottom: 24px;
		}

		.date {
		  font-size: 14px;
		  font-weight: 400;
		  letter-spacing: 0.08em;
		  color: #1a1715;
		  margin-bottom: 64px;
		}

		.countdown {
		  display: flex;
		  align-items: center;
		  justify-content: center;
		  gap: clamp(16px, 4vw, 40px);
		  flex-wrap: nowrap;
		}

		.unit {
		  display: flex;
		  flex-direction: column;
		  align-items: center;
		  gap: 8px;
		  min-width: 0;
		}

		.number {
		  font-family: 'Cormorant Garamond', serif;
		  font-weight: 300;
		  font-size: clamp(40px, 7vw, 88px);
		  line-height: 1;
		  letter-spacing: -0.02em;
		  font-variant-numeric: tabular-nums;
		  /* Tabular figures keep numbers from jumping width as they tick */
		}

		.label {
		  font-size: 11px;
		  font-weight: 500;
		  text-transform: uppercase;
		  letter-spacing: 0.2em;
		  color: #6b5d50;
		}

		.divider {
		  width: 1px;
		  height: clamp(40px, 6vw, 72px);
		  background: #d4c8b8;
		  flex-shrink: 0;
		}

		.message {
		  font-family: 'Cormorant Garamond', serif;
		  font-style: italic;
		  font-size: clamp(32px, 5vw, 56px);
		  font-weight: 300;
		  margin-top: 32px;
		}

		.caption {
		  margin-top: 80px;
		  font-size: 13px;
		  color: #6b5d50;
		  letter-spacing: 0.02em;
		}

		.caption a {
		  color: #1a1715;
		  text-decoration: none;
		  border-bottom: 1px solid #d4c8b8;
		  padding-bottom: 2px;
		  transition: border-color 0.3s ease;
		}

		.caption a:hover {
		  border-bottom-color: #1a1715;
		}

		/* Mobile — countdown stays on one line but compresses gracefully */
		@media (max-width: 540px) {
		  .countdown {
			gap: 12px;
		  }
		  .divider {
			display: none;
		  }
		}
    </style>
</head>
<body>	
	<div class="page">
	  <article class="card">
		<p class="eyebrow">Save the date</p>
		
		<h1 class="names">Παναγιώτα &amp; Γιάννης</h1>
		
		<p class="date">Κυριακή, 23 Αυγούστου · 2026</p>
		
		<div class="countdown" id="countdown">
		  <div class="unit">
			<span class="number" id="days">000</span>
			<span class="label">Ημέρες</span>
		  </div>
		  <span class="divider" aria-hidden="true"></span>
		  <div class="unit">
			<span class="number" id="hours">00</span>
			<span class="label">Ώρες</span>
		  </div>
		  <span class="divider" aria-hidden="true"></span>
		  <div class="unit">
			<span class="number" id="minutes">00</span>
			<span class="label">Λεπτά</span>
		  </div>
		  <span class="divider" aria-hidden="true"></span>
		  <div class="unit">
			<span class="number" id="seconds">00</span>
			<span class="label">Δευτερόλεπτα</span>
		  </div>
		</div>
		
		<p class="message" id="message" hidden>We're married 💍</p>
	  </article>
	  
	  <p class="caption">
		<iframe src="https://docs.google.com/forms/d/e/1FAIpQLSdOUgeupWY-5V7oHyi1MDGqiNY6-sGB6jD27r4a6kFeiQAxrw/viewform?usp=sharing&ouid=112498205295219386453?embedded=true" 
		width="100%" height="900" scrolling="no" frameborder="0" marginheight="0" marginwidth="0">
		Φόρτωση...
        </iframe>
	  </p>
	</div>

    <script>		
		// Set the wedding date here — adjust for your own event
		const targetDate = new Date('Aug 23, 2026 19:00:00').getTime();

		const daysEl = document.getElementById('days');
		const hoursEl = document.getElementById('hours');
		const minutesEl = document.getElementById('minutes');
		const secondsEl = document.getElementById('seconds');
		const countdownEl = document.getElementById('countdown');
		const messageEl = document.getElementById('message');

		function updateCountdown() {
		  const now = new Date().getTime();
		  const distance = targetDate - now;

		  // If the date has passed, show the celebratory message instead
		  if (distance < 0) {
			countdownEl.hidden = true;
			messageEl.hidden = false;
			return;
		  }

		  const days = Math.floor(distance / (1000 * 60 * 60 * 24));
		  const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
		  const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
		  const seconds = Math.floor((distance % (1000 * 60)) / 1000);

		  // Pad numbers so the layout doesn't shift as digits change
		  daysEl.textContent = String(days).padStart(2, '0');
		  hoursEl.textContent = String(hours).padStart(2, '0');
		  minutesEl.textContent = String(minutes).padStart(2, '0');
		  secondsEl.textContent = String(seconds).padStart(2, '0');
		}

		updateCountdown();
		setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
